server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /mcp

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,token-usage
  tracing:
    enabled: true

logging:
  file:
    path: logs/
    name: ${logging.file.path}spring.log
  level:
    org.springframework: INFO

config:
  drift:
    baseline:
      path: classpath:baseline-config.yml

tracing:
  external:
    api:
      url: http://localhost:9411/api/v2/traces

